
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koshai Finder — Development Roadmap</title>
<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --color-text-primary: #1A1A1A;
  --color-text-secondary: #555555;
  --color-text-info: #1A5F9E;
  --color-text-success: #1D6B45;
  --color-text-warning: #BA7517;
  --color-text-danger: #A32D2D;
  --color-background-primary: #FFFFFF;
  --color-background-secondary: #F5F5F5;
  --color-background-info: #EBF3FB;
  --color-background-success: #E8F5EE;
  --color-background-warning: #FFF8E7;
  --color-background-danger: #FBEAEA;
  --color-border-primary: #CCCCCC;
  --color-border-secondary: #999999;
  --color-border-tertiary: #E0E0E0;
  --color-border-info: #1A5F9E;
  --color-border-success: #1D6B45;
  --border-radius-lg: 8px;
  --border-radius-md: 6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.rm-wrap{padding:1rem 0}
.phase-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.ptab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);transition:all .15s}
.ptab.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.phase-panel{display:none}
.phase-panel.active{display:block}
.phase-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:1rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.phase-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500}
.phase-title{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.phase-meta{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.progress-bar{height:4px;border-radius:2px;background:var(--color-border-tertiary);margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
.feature-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-bottom:1.5rem}
.feat-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;cursor:pointer;transition:border-color .15s;user-select:none}
.feat-card:hover{border-color:var(--color-border-secondary)}
.feat-card.done{border-color:var(--color-border-success);background:var(--color-background-success)}
.feat-top{display:flex;align-items:flex-start;gap:10px}
.feat-check{width:18px;height:18px;min-width:18px;border-radius:4px;border:0.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:1px;transition:all .15s;background:var(--color-background-secondary)}
.feat-card.done .feat-check{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success)}
.feat-name{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.feat-desc{font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.feat-tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;margin-top:6px}
.tag-firebase{background:var(--color-background-warning);color:var(--color-text-warning)}
.tag-ui{background:var(--color-background-info);color:var(--color-text-info)}
.tag-maps{background:var(--color-background-success);color:var(--color-text-success)}
.tag-payment{background:var(--color-background-danger);color:var(--color-text-danger)}
.tag-admin{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.pipeline-section{margin-top:1.5rem;padding-top:1.5rem;border-top:0.5px solid var(--color-border-tertiary)}
.pipeline-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px;text-transform:none}
.pipeline-steps{display:flex;flex-direction:column;gap:6px}
.pipe-step{display:flex;align-items:flex-start;gap:10px;font-size:12px;color:var(--color-text-primary);line-height:1.5}
.pipe-num{width:20px;height:20px;min-width:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;background:var(--color-background-secondary);color:var(--color-text-secondary)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;text-align:center}
.stat-num{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.reset-btn{font-size:12px;color:var(--color-text-secondary);cursor:pointer;background:none;border:none;padding:0;text-decoration:underline;margin-top:4px}
</style>
</head>
<body>
<h2 class="sr-only">Koshai Finder — Full development roadmap and pipeline tracker</h2>

<div class="stats-row" id="stats-row">
  <div class="stat-card"><div class="stat-num" id="s-done">0</div><div class="stat-label">Done</div></div>
  <div class="stat-card"><div class="stat-num" id="s-total">18</div><div class="stat-label">Features</div></div>
  <div class="stat-card"><div class="stat-num" id="s-phases">4</div><div class="stat-label">Phases</div></div>
  <div class="stat-card"><div class="stat-num" id="s-weeks">24</div><div class="stat-label">Weeks est.</div></div>
</div>

<div class="phase-tabs" id="tabs"></div>
<div id="panels"></div>
</div>

<script>
const phases = [
  {
    id:'mvp',
    label:'Phase 1 — MVP',
    color:'info',
    duration:'Weeks 1–6',
    fillColor:'var(--color-text-info)',
    features:[
      {id:'f1',name:'Phone OTP auth',desc:'Firebase phone auth for both users and koshais. Bangladesh +88 prefix.',tags:['firebase']},
      {id:'f2',name:'Koshai registration',desc:'NID upload, photo, coverage district/upazila, rate per cow/goat.',tags:['firebase','ui']},
      {id:'f3',name:'Home map view',desc:'Google Maps with koshai pins. Tap pin → quick profile card.',tags:['maps','ui']},
      {id:'f4',name:'Slot-based booking',desc:'Time slots per day. Users pick slot, koshais accept/decline.',tags:['firebase','ui']},
      {id:'f5',name:'Push notifications',desc:'FCM alerts on booking confirmed, cancelled, or completed.',tags:['firebase']},
    ],
    pipeline:[
      'Set up Firebase project — enable Auth, Firestore, FCM, Storage',
      'Scaffold Android project in Android Studio with Navigation Component',
      'Build Auth flow: phone input → OTP → role selection (user vs koshai)',
      'Build Koshai registration screen with NID + photo upload to Firebase Storage',
      'Integrate Google Maps SDK — show koshais from Firestore as map markers',
      'Build slot booking flow: select slot → confirm → Firestore write → FCM to koshai',
    ]
  },
  {
    id:'trust',
    label:'Phase 2 — Trust',
    color:'success',
    duration:'Weeks 7–12',
    fillColor:'var(--color-text-success)',
    features:[
      {id:'f6',name:'Verified badge system',desc:'NID + trade cert review → blue badge. Admin approves in Firestore.',tags:['firebase','admin']},
      {id:'f7',name:'Live booking tracker',desc:'Real-time status: confirmed → en route → arrived → done.',tags:['firebase','maps']},
      {id:'f8',name:'In-app chat',desc:'Firebase Realtime DB chat between user and koshai after booking confirms.',tags:['firebase','ui']},
      {id:'f9',name:'Ratings & photo reviews',desc:'Post-job 1–5 star rating + optional photo. Firestore average.',tags:['firebase','ui']},
      {id:'f10',name:'Animal count estimator',desc:'Enter animal count → auto-calc estimated cost and time.',tags:['ui']},
    ],
    pipeline:[
      'Build koshai dashboard with incoming booking cards (accept/decline)',
      'Add availability toggle: open / busy / offline — updates Firestore status field',
      'Implement Realtime DB chat (message collection per booking ID)',
      'Build post-job review screen — update koshai.rating average via Cloud Function',
      'Add verified badge logic — admin Firestore flag → badge shown on profile',
      'Build live tracker screen polling Realtime DB for status updates',
    ]
  },
  {
    id:'growth',
    label:'Phase 3 — Growth',
    color:'warning',
    duration:'Weeks 13–18',
    fillColor:'var(--color-text-warning)',
    features:[
      {id:'f11',name:'bKash / Nagad payment',desc:'Deposit to confirm booking. Reduces no-shows by 80%.',tags:['payment','firebase']},
      {id:'f12',name:'Surge pricing (Eid mode)',desc:'Koshais set 1.2×–2× multiplier. Banner warns users during Eid days.',tags:['firebase','ui']},
      {id:'f13',name:'Waitlist system',desc:'Join queue for fully booked koshai. Auto-notify on cancellation.',tags:['firebase']},
      {id:'f14',name:'Group / neighborhood booking',desc:'One organizer, multiple families share a slot and split travel fee.',tags:['firebase','ui']},
      {id:'f15',name:'Smart reminders',desc:'FCM reminders 24h and 2h before booking — to both user and koshai.',tags:['firebase']},
    ],
    pipeline:[
      'Integrate bKash Payment Gateway API (sandbox → production)',
      'Build Eid mode toggle in Firestore — Cloud Function checks date range',
      'Implement waitlist collection: join → ordered queue → notify on vacancy',
      'Build group booking: organizer creates session, others join by session code',
      'Schedule Cloud Functions for 24h/2h FCM reminders before booking timestamps',
    ]
  },
  {
    id:'scale',
    label:'Phase 4 — Scale',
    color:'danger',
    duration:'Weeks 19–24',
    fillColor:'var(--color-text-danger)',
    features:[
      {id:'f16',name:'Demand heatmap',desc:'Color-coded map zones showing koshai shortage vs surplus by area.',tags:['maps','firebase']},
      {id:'f17',name:'Koshai leaderboard',desc:'District-level ranking by rating + jobs done. Featured on home screen.',tags:['firebase','ui']},
      {id:'f18',name:'Admin web dashboard',desc:'Firebase + web panel: verify koshais, resolve disputes, analytics, bans.',tags:['admin','firebase']},
    ],
    pipeline:[
      'Build admin web app (React + Firebase) — koshai verification queue, dispute log',
      'Implement fraud detection Cloud Function — flag accounts with impossible booking counts',
      'Add heatmap overlay using Maps JS API with aggregated Firestore demand data',
      'Build referral system — unique codes, credit ledger in Firestore, commission tracking',
      'Leaderboard: Cloud Function aggregates top koshais per district nightly',
      'Publish to Play Store — set up CI/CD with GitHub Actions for APK builds',
    ]
  }
];

const done = new Set(JSON.parse(localStorage.getItem('kf_done')||'[]').filter(Boolean));

function save(){try{localStorage.setItem('kf_done',JSON.stringify([...done]))}catch(e){}}
function updateStats(){
  document.getElementById('s-done').textContent=done.size;
}
function updateProgress(phase){
  const ids=phase.features.map(f=>f.id);
  const n=ids.filter(id=>done.has(id)).length;
  const pct=ids.length?Math.round(n/ids.length*100):0;
  const fill=document.getElementById('prog-'+phase.id);
  if(fill){fill.style.width=pct+'%';fill.style.background=phase.fillColor}
}

const tabs=document.getElementById('tabs');
const panels=document.getElementById('panels');

phases.forEach((ph,i)=>{
  const tab=document.createElement('button');
  tab.className='ptab'+(i===0?' active':'');
  tab.textContent=ph.label;
  tab.onclick=()=>{
    document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.phase-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+ph.id).classList.add('active');
  };
  tabs.appendChild(tab);

  const panel=document.createElement('div');
  panel.className='phase-panel'+(i===0?' active':'');
  panel.id='panel-'+ph.id;

  const doneInPhase=ph.features.filter(f=>done.has(f.id)).length;
  const pct=Math.round(doneInPhase/ph.features.length*100);

  panel.innerHTML=`
    <div class="phase-header">
      <div>
        <div class="phase-title">${ph.label}</div>
        <div class="phase-meta">${ph.duration} &nbsp;·&nbsp; ${ph.features.length} features &nbsp;·&nbsp; ${pct}% complete</div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-${ph.id}" style="width:${pct}%;background:${ph.fillColor}"></div></div>
    <div class="feature-grid" id="grid-${ph.id}"></div>
    <div class="pipeline-section">
      <div class="pipeline-title">Build pipeline for this phase</div>
      <div class="pipeline-steps">
        ${ph.pipeline.map((s,j)=>`<div class="pipe-step"><div class="pipe-num">${j+1}</div><span>${s}</span></div>`).join('')}
      </div>
    </div>
  `;
  panels.appendChild(panel);

  const grid=panel.querySelector('#grid-'+ph.id);
  ph.features.forEach(f=>{
    const card=document.createElement('div');
    card.className='feat-card'+(done.has(f.id)?' done':'');
    card.innerHTML=`
      <div class="feat-top">
        <div class="feat-check">${done.has(f.id)?'✓':''}</div>
        <div>
          <div class="feat-name">${f.name}</div>
          <div class="feat-desc">${f.desc}</div>
          <div>${f.tags.map(t=>`<span class="feat-tag tag-${t}">${t}</span>`).join(' ')}</div>
        </div>
      </div>
    `;
    card.onclick=()=>{
      if(done.has(f.id)){done.delete(f.id);card.classList.remove('done');card.querySelector('.feat-check').textContent=''}
      else{done.add(f.id);card.classList.add('done');card.querySelector('.feat-check').textContent='✓'}
      save();updateStats();updateProgress(ph);
      const meta=panel.querySelector('.phase-meta');
      const nd=ph.features.filter(x=>done.has(x.id)).length;
      const np=Math.round(nd/ph.features.length*100);
      meta.textContent=`${ph.duration} · ${ph.features.length} features · ${np}% complete`;
    };
    grid.appendChild(card);
  });
});

updateStats();
</script>
</body>
</html>
